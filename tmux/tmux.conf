# Show session name and hostname on status bar.
set-option -g status-left "[#S] #(hostname) "

# Extend the status line width.
# See: https://stackoverflow.com/a/72548456
set-option -g status-left-length 50

# Double the default scrollback history.
set-option -g history-limit 4000

# Enable mouse.
set-option -g mouse on
